<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financo - Lançamentos Salvos</title>
    <style>
        * { margin: 0; padding: 0; font-family: Arial, sans-serif; box-sizing: border-box; }
        html { font-size: 16px; }
        body { max-width: 1200px; margin: 1rem auto; padding: 0 0.75rem; background: #f5f5f5; }
        h1 { text-align: center; color: #1565c0; margin-bottom: 1.5rem; font-size: 1.75rem; }

        .btn { padding: 0.75rem 1rem; border: none; border-radius: 0.5rem; font-size: 0.9rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 0.25rem; transition: 0.2s; text-decoration: none; }
        .btn.voltar { background: #616161; color: white; margin-bottom: 1.5rem; }
        .btn.voltar:hover { background: #424242; }
        .btn.perigo { background: #c62828; color: white; }
        .btn.perigo:hover { background: #8e0000; }
        .btn.pequeno { padding: 0.5rem 0.75rem; font-size: 0.85rem; }

        .aviso-vazio { background: white; padding: 2rem; border-radius: 0.5rem; text-align: center; color: #666; font-size: 1rem; box-shadow: 0 0.125rem 0.5rem rgba(0,0,0,0.1); }

        .bloco-salvo { background: white; border-radius: 0.5rem; box-shadow: 0 0.125rem 0.5rem rgba(0,0,0,0.1); margin-bottom: 2rem; overflow: hidden; }
        .cabecalho-bloco { background: #e3f2fd; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; border-bottom: 1px solid #bbdefb; }
        .cabecalho-bloco h3 { color: #1565c0; font-size: 1.1rem; }
        .data-salvo { font-size: 0.85rem; color: #555; }

        .tabela-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.875rem 0.625rem; text-align: left; border-bottom: 1px solid #eee; font-size: 0.875rem; }
        th { background: #1565c0; color: white; font-weight: 600; }
        .venda { color: #2e7d32; font-weight: 600; }
        .despesa { color: #c62828; font-weight: 600; }

        .totais-bloco { padding: 1rem 1.25rem; background: #fafafa; display: flex; gap: 0.9375rem; flex-wrap: wrap; border-top: 1px solid #eee; }
        .card { flex: 1 1 130px; padding: 0.75rem; border-radius: 0.375rem; text-align: center; font-size: 0.875rem; }
        .card.vendas { background: #e8f5e9; color: #2e7d32; }
        .card.despesas { background: #ffebee; color: #c62828; }
        .card.saldo { background: #e3f2fd; color: #1565c0; }
        .valor { font-size: 1.1rem; font-weight: bold; margin-top: 0.25rem; }

        @media (max-width: 768px) {
            .tabela-wrapper { overflow: visible; }
            table, thead, tbody, th, td, tr { display: block; width: 100%; }
            thead { display: none; }
            tr { margin-bottom: 1rem; border-bottom: 2px solid #f0f0f0; background: #fafafa; border-radius: 0.5rem; padding: 0.5rem; }
            td { padding: 0.625rem 0.5rem; border: none; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
            td::before { content: attr(etiqueta); font-weight: 600; color: #444; text-transform: uppercase; font-size: 0.75rem; }
        }

        @media print {
            body * { visibility: hidden; }
            .bloco-salvo, .bloco-salvo * { visibility: visible; }
            .bloco-salvo { position: relative; left: 0; top: 0; width: 100%; margin-bottom: 1.5rem; }
            .btn, .cabecalho-bloco button { display: none !important; }
        }
    </style>
</head>
<body>

    <h1>🕒 Lançamentos Salvos</h1>
    <a href="index.html" class="btn voltar">⬅️ Voltar ao Início</a>

    <div id="conteudoSalvos"></div>

    <script>
        function carregarSalvos() {
            const conteudo = document.getElementById('conteudoSalvos');
            const dados = localStorage.getItem('financoPastaSalvos');

            if (!dados) {
                conteudo.innerHTML = `
                    <div class="aviso-vazio">
                        <p>Nenhum lançamento foi salvo ainda!</p>
                        <p style="margin-top: 0.5rem;">Clique em "Salvar Localmente" na página de exportação para registrar seus lançamentos.</p>
                    </div>
                `;
                return;
            }

            const listaSalvos = JSON.parse(dados);

            if (listaSalvos.length === 0) {
                conteudo.innerHTML = `
                    <div class="aviso-vazio">
                        <p>A lista de salvos está vazia.</p>
                    </div>
                `;
                return;
            }

            listaSalvos.forEach((arquivo, indice) => {
                let totalV = 0, totalD = 0;
                arquivo.lancamentos.forEach(l => {
                    l.tipo === 'venda' ? totalV += l.valor : totalD += l.valor;
                });
                const saldo = totalV - totalD;

                conteudo.innerHTML += `
                    <div class="bloco-salvo">
                        <div class="cabecalho-bloco">
                            <div>
                                <h3>Registro ${listaSalvos.length - indice}</h3>
                                <span class="data-salvo">Salvo em: ${arquivo.dataHora}</span>
                            </div>
                            <button class="btn perigo pequeno" onclick="excluirRegistro(${indice})">🗑️ Excluir</button>
                        </div>
                        <div class="tabela-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Data</th>
                                        <th>Tipo</th>
                                        <th>Item</th>
                                        <th>Valor</th>
                                        <th>Pagamento</th>
                                        <th>Observação</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${arquivo.lancamentos.map(l => `
                                        <tr>
                                            <td etiqueta="Data">${l.data}</td>
                                            <td etiqueta="Tipo" class="${l.tipo}">${l.tipo === 'venda' ? 'Venda / Entrada' : 'Despesa / Saída'}</td>
                                            <td etiqueta="Item">${l.item}</td>
                                            <td etiqueta="Valor">R$ ${l.valor.toFixed(2).replace('.', ',')}</td>
                                            <td etiqueta="Pagamento">${l.pag}</td>
                                            <td etiqueta="Observação">${l.obs}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                        <div class="totais-bloco">
                            <div class="card vendas">
                                <div>Total Vendas</div>
                                <div class="valor">R$ ${totalV.toFixed(2).replace('.', ',')}</div>
                            </div>
                            <div class="card despesas">
                                <div>Total Despesas</div>
                                <div class="valor">R$ ${totalD.toFixed(2).replace('.', ',')}</div>
                            </div>
                            <div class="card saldo">
                                <div>Saldo Líquido</div>
                                <div class="valor">R$ ${saldo.toFixed(2).replace('.', ',')}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function excluirRegistro(indice) {
            if (confirm('Tem certeza que deseja excluir este registro salvo? Essa ação não pode ser desfeita!')) {
                const listaSalvos = JSON.parse(localStorage.getItem('financoPastaSalvos') || '[]');
                listaSalvos.splice(indice, 1);
                localStorage.setItem('financoPastaSalvos', JSON.stringify(listaSalvos));
                carregarSalvos();
            }
        }

        window.onload = carregarSalvos;
    </script>
</body>
</html>
