<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financo - Gerenciar Itens</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
max-width:1200px;
margin:auto;
padding:20px;
}

.topo{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
gap:10px;
}

h1{
color:#1565c0;
font-size:1.8rem;
}

.btn{
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
text-decoration:none;
display:inline-block;
}

.voltar{
background:#616161;
color:white;
}

.salvar{
background:#2e7d32;
color:white;
width:100%;
margin-top:15px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.card h2{
margin-bottom:15px;
color:#1565c0;
}

.item{
display:flex;
gap:10px;
margin-bottom:10px;
}

.item input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

.excluir{
background:#c62828;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.adicionar{
background:#1565c0;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

@media(max-width:600px){

.item{
flex-direction:column;
}

.excluir{
width:100%;
}

}

</style>
</head>

<body>

<div class="topo">

<a href="index.html" class="btn voltar">
⬅ Voltar
</a>

<h1>⚙️ Gerenciar Itens</h1>

</div>

<div class="card">

<h2>📈 Itens de Venda / Entrada</h2>

<div id="listaVenda"></div>

<button
class="adicionar"
onclick="adicionarVenda()">
+ Adicionar Item
</button>

</div>

<div class="card">

<h2>📉 Itens de Despesa / Saída</h2>

<div id="listaDespesa"></div>

<button
class="adicionar"
onclick="adicionarDespesa()">
+ Adicionar Item
</button>

</div>

<button
class="btn salvar"
onclick="salvarTudo()">
✅ Salvar Alterações
</button>

<script>

let itensVenda =
JSON.parse(
localStorage.getItem("financoItensVenda")
) || [
"Venda de Produto",
"Serviço Prestado"
];

let itensDespesa =
JSON.parse(
localStorage.getItem("financoItensDespesa")
) || [
"Fornecedor",
"Salário",
"Aluguel"
];

function renderizar(){

const listaVenda =
document.getElementById("listaVenda");

const listaDespesa =
document.getElementById("listaDespesa");

listaVenda.innerHTML = "";
listaDespesa.innerHTML = "";

itensVenda.forEach((item,index)=>{

listaVenda.innerHTML += `
<div class="item">
<input
type="text"
value="${item}"
id="venda_${index}">
<button
class="excluir"
onclick="removerVenda(${index})">
X
</button>
</div>
`;

});

itensDespesa.forEach((item,index)=>{

listaDespesa.innerHTML += `
<div class="item">
<input
type="text"
value="${item}"
id="despesa_${index}">
<button
class="excluir"
onclick="removerDespesa(${index})">
X
</button>
</div>
`;

});

}

function adicionarVenda(){

itensVenda.push("");

renderizar();

}

function adicionarDespesa(){

itensDespesa.push("");

renderizar();

}

function removerVenda(index){

itensVenda.splice(index,1);

renderizar();

}

function removerDespesa(index){

itensDespesa.splice(index,1);

renderizar();

}

function salvarTudo(){

itensVenda =
itensVenda.map((item,index)=>{

return document
.getElementById(`venda_${index}`)
.value
.trim();

}).filter(item=>item);

itensDespesa =
itensDespesa.map((item,index)=>{

return document
.getElementById(`despesa_${index}`)
.value
.trim();

}).filter(item=>item);

localStorage.setItem(
"financoItensVenda",
JSON.stringify(itensVenda)
);

localStorage.setItem(
"financoItensDespesa",
JSON.stringify(itensDespesa)
);

alert("✅ Categorias salvas com sucesso!");

renderizar();

}

renderizar();

</script>

</body>
</html>
