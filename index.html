<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    max-width:1200px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#1565c0;
    margin-bottom:25px;
    font-size:2rem;
}

.menu{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-bottom:30px;
}

.botao{
    text-decoration:none;
    text-align:center;
    padding:18px;
    border-radius:10px;
    font-weight:bold;
    transition:.2s;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:65px;
}

.botao:hover{
    transform:translateY(-2px);
}

.primario{
    background:#1565c0;
    color:white;
}

.secundario{
    background:#e0e0e0;
    color:#333;
}

.cards{
    display:grid;
    gap:20px;
}

.card{
    padding:30px;
    border-radius:12px;
    color:white;
    text-align:center;
}

.card h2{
    margin-top:10px;
    font-size:2rem;
}

.vendas{
    background:#2e7d32;
}

.despesas{
    background:#c62828;
}

.saldo{
    background:#1565c0;
}

.rodape{
    margin-top:30px;
    text-align:center;
    color:#666;
    font-size:14px;
}

@media(max-width:600px){

    body{
        padding:15px;
    }

    h1{
        font-size:1.7rem;
    }

    .menu{
        grid-template-columns:1fr 1fr;
    }

}

</style>
</head>

<body>

<h1>🔹 Financo</h1>

<div class="menu">

<a href="gerenciar.html" class="botao primario">
⚙️ Gerenciar Itens
</a>

<a href="lancamento.html" class="botao primario">
➕ Novo Lançamento
</a>

<a href="salvos.html" class="botao secundario">
🕒 Últimos Salvos
</a>

<a href="integracao.html" class="botao secundario">
🔗 Integração
</a>

<a href="meses.html" class="botao secundario">
📂 Meses
</a>

<a href="grafico.html" class="botao secundario">
📊 Gráfico
</a>

</div>

<div class="cards">

<div class="card vendas">
<div>Total Vendas</div>
<h2 id="totalVendas">R$ 0,00</h2>
</div>

<div class="card despesas">
<div>Total Despesas</div>
<h2 id="totalDespesas">R$ 0,00</h2>
</div>

<div class="card saldo">
<div>Saldo Líquido</div>
<h2 id="saldoLiquido">R$ 0,00</h2>
</div>

</div>

<div class="rodape">
Financo • Controle Financeiro
</div>

<script>

// Carrega lançamentos locais

const lancamentos =
JSON.parse(
localStorage.getItem("financoLancamentos")
) || [];

// Totais

let totalVendas = 0;
let totalDespesas = 0;

lancamentos.forEach(item => {

    if(item.tipo === "venda"){
        totalVendas += Number(item.valor);
    }else{
        totalDespesas += Number(item.valor);
    }

});

const saldo = totalVendas - totalDespesas;

// Atualiza Dashboard

document.getElementById("totalVendas").innerHTML =
`R$ ${totalVendas.toFixed(2).replace(".",",")}`;

document.getElementById("totalDespesas").innerHTML =
`R$ ${totalDespesas.toFixed(2).replace(".",",")}`;

document.getElementById("saldoLiquido").innerHTML =
`R$ ${saldo.toFixed(2).replace(".",",")}`;

</script>

</body>
</html>
