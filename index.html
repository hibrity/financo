<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financo - Acesso</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.48.1/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .caixa { background: white; padding: 2rem; border-radius: 0.75rem; box-shadow: 0 0.25rem 1rem rgba(0,0,0,0.1); width: 100%; max-width: 420px; }
        h1 { text-align: center; color: #1565c0; margin-bottom: 1.5rem; font-size: 1.75rem; }
        .abas { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        .aba { flex: 1; padding: 0.75rem; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 500; background: #e0e0e0; color: #333; transition: 0.2s; }
        .aba.ativa { background: #1565c0; color: white; }
        .grupo { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #444; font-weight: 500; font-size: 0.9rem; }
        input, select { width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 0.5rem; font-size: 1rem; background: white; }
        input:focus, select:focus { outline: none; border-color: #1565c0; }
        .botao { width: 100%; padding: 0.875rem; border: none; border-radius: 0.5rem; background: #1565c0; color: white; font-size: 1rem; font-weight: 500; cursor: pointer; transition: 0.2s; margin-top: 0.5rem; }
        .botao:hover { background: #0d47a1; }
        .botao:disabled { background: #90caf9; cursor: not-allowed; }
        .mensagem { margin-top: 1rem; padding: 0.75rem; border-radius: 0.5rem; text-align: center; font-size: 0.9rem; display: none; }
        .erro { background: #ffebee; color: #c62828; }
        .sucesso { background: #e8f5e9; color: #2e7d32; }
        .oculto { display: none; }
        .link { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #666; }
        .link a { color: #1565c0; text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="caixa">
        <h1>🔹 Financo</h1>

        <div class="abas">
            <button class="aba ativa" onclick="mostrarLogin()">Entrar</button>
            <button class="aba" onclick="mostrarCadastro()">Criar Conta</button>
        </div>

        <div id="areaLogin">
            <div class="grupo">
                <label>E-mail</label>
                <input type="email" id="emailLogin" placeholder="seu@email.com">
            </div>
            <div class="grupo">
                <label>Senha</label>
                <input type="password" id="senhaLogin" placeholder="Sua senha">
            </div>
            <button class="botao" id="btnLogin" onclick="entrar()">Acessar Sistema</button>
            <div class="mensagem erro" id="msgLogin"></div>
            <div class="link">
                <a href="#" onclick="mostrarRecupera(event)">Esqueceu a senha?</a>
            </div>
        </div>

        <div id="areaCadastro" class="oculto">
            <div class="grupo">
                <label>Nome Completo</label>
                <input type="text" id="nomeCad" placeholder="Seu nome completo">
            </div>
            <div class="grupo">
                <label>Tipo de Pessoa</label>
                <select id="tipoPessoaCad" onchange="ajustarDocumento()">
                    <option value="fisica">Pessoa Física (CPF)</option>
                    <option value="juridica">Pessoa Jurídica (CNPJ)</option>
                </select>
            </div>
            <div class="grupo">
                <label id="labelDocCad">CPF</label>
                <input type="text" id="documentoCad" placeholder="000.000.000-00" maxlength="14">
            </div>
            <div class="grupo">
                <label>E-mail</label>
                <input type="email" id="emailCad" placeholder="seu@email.com">
            </div>
            <div class="grupo">
                <label>Senha (mínimo 6 caracteres)</label>
                <input type="password" id="senhaCad" placeholder="Crie uma senha segura">
            </div>
            <button class="botao" id="btnCad" onclick="cadastrar()">Criar Conta</button>
            <div class="mensagem erro" id="msgCad"></div>
        </div>

        <div id="areaRecupera" class="oculto">
            <div class="grupo">
                <label>E-mail cadastrado</label>
                <input type="email" id="emailRecupera" placeholder="seu@email.com">
            </div>
            <button class="botao" id="btnRecupera" onclick="recuperarSenha()">Enviar Link</button>
            <div class="mensagem" id="msgRecupera"></div>
            <div class="link">
                <a href="#" onclick="mostrarLogin()">Voltar ao login</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jigsckumatxoxveqatpb.supabase.co';
        const SUPABASE_CHAVE = 'sb_publishable_w1CpoC-qE6XkoGGzHvmK2A_nOFo8HRy';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_CHAVE);

        async function verificarLogado() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                const { data: { user } } = await supabase.auth.getUser();
                const nivel = user?.user_metadata?.nivel || 'comum';
                localStorage.setItem('usuarioLogado', user.id);
                localStorage.setItem('nivelUsuario', nivel);
                
                if (nivel === 'master') {
                    window.location.href = './painel-master.html';
                } else {
                    window.location.href = './inicio.html';
                }
            }
        }
        verificarLogado();

        function mostrarLogin() {
            document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
            document.querySelectorAll('.aba')[0].classList.add('ativa');
            document.getElementById('areaLogin').classList.remove('oculto');
            document.getElementById('areaCadastro').classList.add('oculto');
            document.getElementById('areaRecupera').classList.add('oculto');
            limparMensagens();
        }

        function mostrarCadastro() {
            document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
            document.querySelectorAll('.aba')[1].classList.add('ativa');
            document.getElementById('areaLogin').classList.add('oculto');
            document.getElementById('areaCadastro').classList.remove('oculto');
            document.getElementById('areaRecupera').classList.add('oculto');
            limparMensagens();
        }

        function mostrarRecupera(e) {
            e.preventDefault();
            document.getElementById('areaLogin').classList.add('oculto');
            document.getElementById('areaRecupera').classList.remove('oculto');
            limparMensagens();
        }

        function limparMensagens() {
            document.querySelectorAll('.mensagem').forEach(m => m.style.display = 'none');
        }

        function ajustarDocumento(){
            const tipo = document.getElementById('tipoPessoaCad').value;
            const label = document.getElementById('labelDocCad');
            const input = document.getElementById('documentoCad');
            
            if(tipo === 'fisica'){
                label.textContent = 'CPF';
                input.placeholder = '000.000.000-00';
                input.maxLength = 14;
            } else {
                label.textContent = 'CNPJ';
                input.placeholder = '00.000.000/0000-00';
                input.maxLength = 18;
            }
            input.value = '';
        }

        function formatarDocumento(valor){
            valor = valor.replace(/\D/g, '');
            if(valor.length === 11){
                return valor.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            } else if(valor.length === 14){
                return valor.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
            }
            return valor;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const docInput = document.getElementById('documentoCad');
            if(docInput){
                docInput.addEventListener('input', (e) => {
                    e.target.value = formatarDocumento(e.target.value);
                });
            }
        });

        async function entrar(){
            const email = document.getElementById('emailLogin').value.trim();
            const senha = document.getElementById('senhaLogin').value.trim();
            const msg = document.getElementById('msgLogin');
            const btn = document.getElementById('btnLogin');

            if(!email || !senha){
                msg.textContent = '⚠️ Preencha e-mail e senha!';
                msg.style.display='block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Entrando...';
            msg.style.display='none';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ 
                    email: email, 
                    password: senha 
                });
                if(error) throw error;

                const user = data.user;
                const nivel = user.user_metadata?.nivel || 'comum';

                localStorage.setItem('usuarioLogado', user.id);
                localStorage.setItem('nivelUsuario', nivel);

                if (nivel === 'master') {
                    window.location.href = './painel-master.html';
                } else {
                    window.location.href = './inicio.html';
                }
            } catch (erro) {
                msg.className = 'mensagem erro';
                msg.textContent = '❌ ' + erro.message;
                msg.style.display='block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Acessar Sistema';
            }
        }

        async function cadastrar(){
            const nome = document.getElementById('nomeCad').value.trim();
            const tipoPessoa = document.getElementById('tipoPessoaCad').value;
            const documento = document.getElementById('documentoCad').value.trim();
            const email = document.getElementById('emailCad').value.trim();
            const senha = document.getElementById('senhaCad').value.trim();
            const msg = document.getElementById('msgCad');
            const btn = document.getElementById('btnCad');

            if(nome.length < 3){
                msg.textContent = '⚠️ Nome com pelo menos 3 letras!';
                msg.style.display='block';
                return;
            }
            const apenasNumeros = documento.replace(/\D/g, '');
            if(tipoPessoa === 'fisica' && apenasNumeros.length !== 11){
                msg.textContent = '⚠️ CPF inválido! Digite 11 números.';
                msg.style.display='block';
                return;
            }
            if(tipoPessoa === 'juridica' && apenasNumeros.length !== 14){
                msg.textContent = '⚠️ CNPJ inválido! Digite 14 números.';
                msg.style.display='block';
                return;
            }
            if(!email.includes('@')){
                msg.textContent = '⚠️ Digite um e-mail válido!';
                msg.style.display='block';
                return;
            }
            if(senha.length < 6){
                msg.textContent = '⚠️ Senha com pelo menos 6 caracteres!';
                msg.style.display='block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Cadastrando...';
            msg.style.display='none';

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: senha,
                    options: { 
                        data: { 
                            nome: nome,
                            tipo_pessoa: tipoPessoa,
                            documento: documento,
                            nivel: 'comum',
                            status_aprovacao: 'aprovado'
                        }, 
                        emailRedirectTo: window.location.origin 
                    }
                });
                if(error) throw error;

                msg.className = 'mensagem sucesso';
                msg.textContent = '✅ Conta criada com sucesso! Você já pode acessar o sistema.';
                msg.style.display='block';
                setTimeout(mostrarLogin, 3000);
            } catch (erro) {
                msg.className = 'mensagem erro';
                msg.textContent = '❌ ' + erro.message;
                msg.style.display='block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Criar Conta';
            }
        }

        async function recuperarSenha(){
            const email = document.getElementById('emailRecupera').value.trim();
            const msg = document.getElementById('msgRecupera');
            const btn = document.getElementById('btnRecupera');

            if(!email.includes('@')){
                msg.className = 'mensagem erro';
                msg.textContent = '⚠️ Digite um e-mail válido!';
                msg.style.display='block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Enviando...';
            msg.style.display='none';

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/index.html#nova-senha'
                });
                if(error) throw error;

                msg.className = 'mensagem sucesso';
                msg.textContent = '✅ Link enviado! Verifique sua caixa de e-mail.';
                msg.style.display='block';
            } catch (erro) {
                msg.className = 'mensagem erro';
                msg.textContent = '❌ ' + erro.message;
                msg.style.display='block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Enviar Link';
            }
        }
    </script>
</body>
</html>
