<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Lançamento - Financo</title>
    <style>
        * { margin: 0; padding: 0; font-family: Arial, sans-serif; box-sizing: border-box; }
        body { max-width: 800px; margin: 2rem auto; padding: 0 1rem; background: #f5f5f5; }
        .cabecalho { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
        .btn { padding: 0.75rem 1rem; border: none; border-radius: 0.5rem; cursor: pointer; text-decoration: none; display: inline-block; text-align: center; }
        .btn.voltar { background: #616161; color: white; }
        .btn.sucesso { background: #2e7d32; color: white; width: 100%; margin-top: 1rem; font-size: 1.1rem; }
        .form { background: white; padding: 1.5rem; border-radius: 0.5rem; }
        .linha { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .campo { flex: 1 1 200px; display: flex; flex-direction: column; gap: 0.5rem; }
        .campo.grande { flex: 2 1 300px; }
        label { font-weight: 500; color: #333; }
        input, select { padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.375rem; font-size: 1rem; }
        .tipo { display: flex; gap: 1rem; padding: 0.5rem 0; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div class="cabecalho">
        <a href="index.html" class="btn voltar">⬅️ Voltar</a>
        <h1>➕ Novo Lançamento</h1>
    </div>

    <div class="form">
        <div class="linha">
            <div class="campo">
                <label>Data</label>
                <input type="text" id="data" placeholder="dd/mm/aaaa" maxlength="10">
            </div>
            <div class="campo">
                <label>Tipo</label>
                <div class="tipo">
                    <label><input type="radio" name="tipo" id="venda"> Venda</label>
                    <label><input type="radio" name="tipo" id="despesa"> Despesa</label>
                </div>
            </div>
        </div>
        <div class="linha">
            <div class="campo">
                <label>Item</label>
                <select id="item"><option value="">Selecione primeiro o tipo</option></select>
            </div>
            <div class="campo">
                <label>Valor R$</label>
                <input type="number" step="0.01" id="valor" placeholder="0,00">
            </div>
        </div>
        <div class="linha">
            <div class="campo">
                <label>Pagamento</label>
                <select id="pagamento">
                    <option value="">Selecione</option>
                    <option>Dinheiro</option>
                    <option>Pix</option>
                    <option>Cartão Crédito</option>
                    <option>Cartão Débito</option>
                </select>
            </div>
            <div class="campo grande">
                <label>Observação</label>
                <input type="text" id="obs" placeholder="Opcional">
            </div>
        </div>
        <button class="btn sucesso" onclick="salvar()">✅ Salvar Lançamento</button>
    </div>

    <script>
        function dataHoje() {
            const d = new Date();
            return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
        }
        function atualizarSelect() {
            const ehVenda = document.getElementById('venda').checked;
            const ehDespesa = document.getElementById('despesa').checked;
            const select = document.getElementById('item');
            select.innerHTML = '<option value="">Selecione primeiro o tipo</option>';
            const itens = JSON.parse(localStorage.getItem(ehVenda ? 'financoItensVenda' : 'financoItensDespesa') || '[]');
            itens.forEach(n => select.appendChild(new Option(n, n)));
        }
        function salvar() {
            const ehVenda = document.getElementById('venda').checked;
            const ehDespesa = document.getElementById('despesa').checked;
            const data = document.getElementById('data').value.trim();
            const item = document.getElementById('item').value.trim();
            const valor = parseFloat(document.getElementById('valor').value || 0);
            const pag = document.getElementById('pagamento').value.trim();
            const obs = document.getElementById('obs').value.trim() || '-';

            if(!data || (!ehVenda && !ehDespesa) || !item || valor <= 0 || !pag) return alert('Preencha todos os campos!');

            const lancamentos = JSON.parse(localStorage.getItem('financoLancamentos') || '[]');
            lancamentos.push({data, tipo: ehVenda ? 'venda' : 'despesa', item, valor, pag, obs});
            localStorage.setItem('financoLancamentos', JSON.stringify(lancamentos));
            alert('✅ Lançamento salvo com sucesso!');
            window.location.href = 'index.html';
        }
        window.onload = () => {
            document.getElementById('data').value = dataHoje();
            document.getElementById('venda').addEventListener('change', atualizarSelect);
            document.getElementById('despesa').addEventListener('change', atualizarSelect);
        };
    </script>
</body>
</html>
